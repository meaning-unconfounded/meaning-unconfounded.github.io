<!-- ═══════════════════════════════════════════════════════════════
     THE LISTENING ROOM — Media Alcove
     ═══════════════════════════════════════════════════════════════ -->

<div id="listeningRoom" class="listening-room">
  <div class="lr-header">
    <span class="lr-kick">The Listening Room</span>
    <button id="lrShuffle" class="lr-shuffle" aria-label="Shuffle selection" title="New selection">↻</button>
  </div>
  
  <div class="lr-videos" id="lrVideos">
    <div class="lr-empty">The alcove awaits your contributions</div>
  </div>
  
  <div class="lr-divider">❦</div>
  
  <div class="lr-audio" id="lrAudio"></div>
</div>

<style>
.listening-room {
  margin: 2.5rem auto;
  max-width: var(--measure);
  background: var(--surface);
  border: 1px solid var(--hair);
  border-radius: var(--radius);
  padding: 1.4rem 1.6rem 1.2rem;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.listening-room::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold-soft), var(--gold-2), var(--gold-soft));
  opacity: 0.6;
}
.lr-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid var(--hair);
}
.lr-kick {
  font-family: var(--sans);
  font-size: .68rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .22em;
  color: var(--gold);
}
.lr-shuffle {
  width: 2rem; height: 2rem;
  border: 1px solid var(--hair);
  border-radius: 50%;
  background: var(--surface-2);
  color: var(--gold);
  font-size: .9rem;
  cursor: pointer;
  transition: all .25s;
  display: flex; align-items: center; justify-content: center;
}
.lr-shuffle:hover {
  border-color: var(--gold-2);
  background: var(--gold-soft);
  transform: rotate(180deg);
}
.lr-shuffle:active { transform: scale(0.9) rotate(180deg); }
.lr-videos {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 0.8rem;
}
@media (max-width: 640px) {
  .lr-videos { grid-template-columns: 1fr; }
}
.lr-video {
  position: relative;
  border-radius: 10px;
  overflow: hidden;
  background: var(--surface-2);
  border: 1px solid var(--hair);
  aspect-ratio: 16 / 9;
}
.lr-video video {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  cursor: pointer;
  transition: opacity .3s;
}
.lr-video:hover video { opacity: 0.9; }
.lr-video-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(36, 33, 26, 0.25);
  opacity: 0;
  transition: opacity .3s;
  pointer-events: none;
}
.lr-video:hover .lr-video-overlay { opacity: 1; }
.lr-play-btn {
  width: 3rem; height: 3rem;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--gold-2);
  color: var(--gold);
  font-size: 1.1rem;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-sm);
  pointer-events: auto;
  cursor: pointer;
  transition: all .2s;
}
.lr-play-btn:hover {
  background: var(--gold-soft);
  transform: scale(1.08);
}
.lr-video-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: .35rem .6rem;
  background: linear-gradient(transparent, rgba(36,33,26,0.7));
  font-family: var(--sans);
  font-size: .65rem;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: #f3efe2;
  opacity: 0;
  transition: opacity .3s;
}
.lr-video:hover .lr-video-label { opacity: 1; }
.lr-divider {
  text-align: center;
  color: var(--gold);
  font-size: .9rem;
  margin: .6rem 0;
  opacity: 0.5;
}
.lr-audio {
  background: var(--surface-2);
  border: 1px solid var(--hair);
  border-radius: 10px;
  padding: .8rem 1rem;
  display: flex;
  align-items: center;
  gap: .8rem;
}
.lr-audio-play {
  width: 2.4rem; height: 2.4rem;
  border-radius: 50%;
  border: 1px solid var(--gold-2);
  background: var(--surface);
  color: var(--gold);
  font-size: .85rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .2s;
}
.lr-audio-play:hover {
  background: var(--gold-soft);
  transform: scale(1.05);
}
.lr-audio-track {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: .25rem;
}
.lr-audio-label {
  font-family: var(--sans);
  font-size: .65rem;
  text-transform: uppercase;
  letter-spacing: .14em;
  color: var(--muted);
}
.lr-audio-progress {
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: var(--hair);
  overflow: hidden;
  cursor: pointer;
}
.lr-audio-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--gold), var(--gold-2));
  border-radius: 2px;
  transition: width .1s linear;
}
.lr-audio-time {
  font-family: var(--sans);
  font-size: .65rem;
  color: var(--muted);
  text-align: right;
  min-width: 3.5rem;
}
.lr-empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 2rem;
  font-family: var(--serif);
  font-style: italic;
  color: var(--muted);
  font-size: .95rem;
}
html[data-theme="dark"] .lr-video-label {
  background: linear-gradient(transparent, rgba(0,0,0,0.7));
}
</style>

<script>
(function() {
  const videoExts = ['.mp4', '.webm', '.mov'];
  const audioExts = ['.mp3', '.mpa', '.ogg', '.wav', '.m4a'];
  let manifest = null;
  let currentAudio = null;

  async function loadManifest() {
    try {
      const res = await fetch('media-manifest.json');
      if (!res.ok) throw new Error('Manifest not found');
      manifest = await res.json();
      render();
    } catch (e) {
      showEmpty();
    }
  }

  function getRandom(arr, n) {
    const shuffled = arr.slice().sort(() => 0.5 - Math.random());
    return shuffled.slice(0, n);
  }

  function formatTime(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return m + ':' + sec.toString().padStart(2, '0');
  }

  function showEmpty() {
    document.getElementById('lrVideos').innerHTML = 
      '<div class="lr-empty">The alcove awaits your contributions</div>';
    document.getElementById('lrAudio').innerHTML = '';
  }

  function render() {
    if (!manifest) return;
    const videos = manifest.filter(f => videoExts.some(e => f.toLowerCase().endsWith(e)));
    const audios = manifest.filter(f => audioExts.some(e => f.toLowerCase().endsWith(e)));
    
    if (videos.length === 0 && audios.length === 0) {
      showEmpty();
      return;
    }

    const videoContainer = document.getElementById('lrVideos');
    if (videos.length > 0) {
      const picks = getRandom(videos, Math.min(2, videos.length));
      videoContainer.innerHTML = picks.map((src, i) => `
        <div class="lr-video">
          <video preload="metadata" data-src="${src}">
            <source src="${src}" type="video/mp4">
          </video>
          <div class="lr-video-overlay">
            <button class="lr-play-btn" data-index="${i}">▶</button>
          </div>
          <div class="lr-video-label">${src.replace(/^.*[\\\\\\/]/, '')}</div>
        </div>
      `).join('');

      videoContainer.querySelectorAll('.lr-play-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const video = this.closest('.lr-video').querySelector('video');
          if (video.paused) {
            videoContainer.querySelectorAll('video').forEach(v => {
              if (v !== video) v.pause();
            });
            video.play();
            this.textContent = '❚❚';
          } else {
            video.pause();
            this.textContent = '▶';
          }
        });
      });

      videoContainer.querySelectorAll('video').forEach(v => {
        v.addEventListener('ended', function() {
          const btn = this.closest('.lr-video').querySelector('.lr-play-btn');
          if (btn) btn.textContent = '▶';
        });
        v.addEventListener('pause', function() {
          const btn = this.closest('.lr-video').querySelector('.lr-play-btn');
          if (btn) btn.textContent = '▶';
        });
        v.addEventListener('play', function() {
          const btn = this.closest('.lr-video').querySelector('.lr-play-btn');
          if (btn) btn.textContent = '❚❚';
        });
      });
    } else {
      videoContainer.innerHTML = '';
    }

    const audioContainer = document.getElementById('lrAudio');
    if (audios.length > 0) {
      const pick = getRandom(audios, 1)[0];
      audioContainer.innerHTML = `
        <button class="lr-audio-play" id="lrAudioPlay">▶</button>
        <div class="lr-audio-track">
          <div class="lr-audio-label">A word in passing — ${pick.replace(/^.*[\\\\\\/]/, '')}</div>
          <div class="lr-audio-progress" id="lrAudioProgress">
            <div class="lr-audio-bar" id="lrAudioBar"></div>
          </div>
        </div>
        <div class="lr-audio-time" id="lrAudioTime">0:00 / 0:00</div>
        <audio id="lrAudioEl" preload="metadata">
          <source src="${pick}" type="audio/mpeg">
        </audio>
      `;

      currentAudio = document.getElementById('lrAudioEl');
      const playBtn = document.getElementById('lrAudioPlay');
      const progress = document.getElementById('lrAudioProgress');
      const bar = document.getElementById('lrAudioBar');
      const time = document.getElementById('lrAudioTime');

      playBtn.addEventListener('click', function() {
        if (currentAudio.paused) {
          currentAudio.play();
          this.textContent = '❚❚';
        } else {
          currentAudio.pause();
          this.textContent = '▶';
        }
      });

      currentAudio.addEventListener('timeupdate', function() {
        const pct = (this.currentTime / this.duration) * 100;
        bar.style.width = pct + '%';
        time.textContent = formatTime(this.currentTime) + ' / ' + formatTime(this.duration);
      });

      currentAudio.addEventListener('ended', function() {
        playBtn.textContent = '▶';
        bar.style.width = '0%';
      });

      currentAudio.addEventListener('loadedmetadata', function() {
        time.textContent = '0:00 / ' + formatTime(this.duration);
      });

      progress.addEventListener('click', function(e) {
        const rect = this.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        currentAudio.currentTime = pct * currentAudio.duration;
      });
    } else {
      audioContainer.innerHTML = '';
    }
  }

  document.getElementById('lrShuffle').addEventListener('click', function() {
    this.style.transform = 'rotate(360deg)';
    setTimeout(() => this.style.transform = '', 400);
    render();
  });

  loadManifest();
})();
</script>
